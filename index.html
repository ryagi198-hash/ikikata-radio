<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>イキカタラジオ キーワードリンク集</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="hero">
  <h1>イキカタラジオ<br>〜日本の端っこから愛を叫ぶ〜</h1>
  <div class="guest">キーワードリンク集 バックナンバー</div>
</div>

<div class="container" id="episode-list">
  <!-- 自動生成されるエピソード一覧 -->
</div>

<div class="footer">
  <p>イキカタラジオ — 株式会社コープ葬祭</p>
</div>

<script>
// episodes/以下のフォルダを一覧表示（manifest.jsonから読み込み）
fetch('episodes/manifest.json')
  .then(r => r.json())
  .then(episodes => {
    const list = document.getElementById('episode-list');
    episodes.reverse().forEach(ep => {
      const div = document.createElement('div');
      div.className = 'section';
      div.innerHTML = `
        <h2><a href="episodes/${ep.id}/" style="color:inherit;text-decoration:none">
          #${ep.number} — ${ep.guest}
        </a></h2>
        <p>${ep.date} | ${ep.theme || ''}</p>
        <a href="episodes/${ep.id}/" class="listen-link" style="font-size:0.85em">キーワードを見る →</a>
      `;
      list.appendChild(div);
    });
  })
  .catch(() => {
    document.getElementById('episode-list').innerHTML = '<p style="text-align:center;padding:40px">エピソードはまだありません</p>';
  });
</script>

</body>
</html>
